services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: stonksco
      POSTGRES_PASSWORD: stonksco_dev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stonksco -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
      build: ./backend
      ports:
        - "8000:8000"
      env_file: .env
      depends_on:
        db:
          condition: service_healthy
      volumes:
        - ./backend:/app
      command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  adminer:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stonksco.com
      PGADMIN_DEFAULT_PASSWORD: admin
      # setup server connection to the database

    ports:
      - "8080:80"


volumes:
  pgdata:
