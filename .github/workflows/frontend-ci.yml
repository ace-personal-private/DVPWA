name: Frontend CI

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  lint:
    name: Lint, format & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: oxlint
        run: npm run lint

      - name: oxfmt check
        run: npm run fmt:check

      - name: Type check & build
        run: npm run build

  sast:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # lets semgrep read CI run context instead of erroring
      security-events: write # lets the SARIF upload write to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # Findings are expected here too (e.g. planted stored-XSS sink) - this
      # reports, it does not gate the build.
      - name: Semgrep
        run: >
          uvx semgrep@latest scan
          --config=p/security-audit --config=p/typescript --config=p/react
          --sarif --output=semgrep-frontend.sarif
          frontend/src

      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-sast-report
          path: semgrep-frontend.sarif
          if-no-files-found: ignore

      - name: Upload Semgrep results to code scanning
        if: always()
        continue-on-error: true # requires GitHub Advanced Security on private repos
        uses: github/codeql-action/upload-sarif@24ea975727876cf496b1eb0c5b36e96e01600b51 # v4.37.0
        with:
          sarif_file: semgrep-frontend.sarif
          category: semgrep-frontend

      # - name: Upload Semgrep results to DefectDojo
      #   if: always()
      #   continue-on-error: true
      #   env:
      #     DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
      #     DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
      #   run: "$GITHUB_WORKSPACE/.github/scripts/defectdojo-upload.sh SARIF semgrep-frontend.sarif 'StonksCo Frontend' Semgrep"

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build frontend image
        run: docker build -t stonksco-frontend:ci ./frontend

      # scan the image with trivy (vulnerability scanner) - this is a best-effort scan, it gates the build if it finds a CVE with severity HIGH or CRITICAL, but it does not fail the build for lower-severity CVEs.
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "stonksco-backend:ci"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push frontend image to GHCR
        run: docker tag stonksco-frontend:ci ghcr.io/${{ github.repository_owner }}/stonksco-frontend:ci && docker push ghcr.io/${{ github.repository_owner }}/stonksco-frontend:ci
